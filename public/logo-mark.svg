<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-labelledby="lm-title">
  <title id="lm-title">GOEUN SERVER HUB</title>
  <defs>
    <linearGradient id="lm-bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="lm-ge" x1="30" y1="30" x2="150" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="lm-frame" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="lm-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lm-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#1e40af" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <g filter="url(#lm-shadow)">
    <rect x="10" y="10" width="160" height="160" rx="42" fill="url(#lm-bg)"/>
    <rect x="17" y="17" width="146" height="146" rx="36" fill="none" stroke="url(#lm-frame)" stroke-width="1.5"/>
  </g>

  <!-- G E ligature -->
  <g filter="url(#lm-glow)" fill="none" stroke="url(#lm-ge)" stroke-linecap="round" stroke-linejoin="round">

    <!-- G: arc from top-right going counter-clockwise, with horizontal bar on right -->
    <!-- Arc: 270° arc (missing the right-side opening) -->
    <path d="M110 62
             A42 42 0 1 0 110 118"
      stroke-width="14"/>
    <!-- G crossbar pointing inward -->
    <path d="M110 90 H82"
      stroke-width="14"/>

    <!-- E: attached to the right side of G -->
    <!-- Top bar -->
    <path d="M114 62 H148" stroke-width="11"/>
    <!-- Middle bar (shares visual space with G crossbar) -->
    <path d="M114 90 H142" stroke-width="11"/>
    <!-- Bottom bar -->
    <path d="M114 118 H148" stroke-width="11"/>
    <!-- Vertical spine of E -->
    <path d="M114 62 V118" stroke-width="11"/>
  </g>

  <!-- Accent dot -->
  <circle cx="148" cy="62" r="5" fill="#06b6d4" opacity="0.9"/>
  <circle cx="148" cy="62" r="9" fill="#06b6d4" opacity="0.15"/>
</svg>
